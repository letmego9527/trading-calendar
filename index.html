        .report-card h3 { color: #333; font-size: 1.1em; margin-bottom: 8px; }
        .report-card .time { color: #888; font-size: 0.9em; margin-bottom: 12px; }
        .report-card a { display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none; padding: 8px 20px; border-radius: 20px; font-size: 0.9em; transition: all 0.3s ease; }
        .report-card a:hover { opacity: 0.9; transform: scale(1.02); }
        .footer { text-align: center; color: rgba(255,255,255,0.8); margin-top: 30px; font-size: 0.9em; }
    </style>
</head>
